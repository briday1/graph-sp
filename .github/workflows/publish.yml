name: Publish to crates.io and PyPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use version from files)'
        required: false
        type: string

jobs:
  update-version:
    name: Update version number
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate version from PyPI
        id: set-version
        run: |
          # Get current year
          YEAR=$(date +'%Y')
          
          # Fetch existing versions from PyPI *and* crates.io, take the max
          NEXT_VERSION=$(python3 << 'PYTHON_EOF'
          import requests
          import re
          import sys
          from datetime import datetime

          year = datetime.now().year
          year_pattern = re.compile(rf'^{year}\.(\d+)')
          nums = []

          # Check PyPI
          try:
              r = requests.get('https://pypi.org/pypi/dagex/json', timeout=10)
              if r.status_code == 200:
                  for v in r.json().get('releases', {}).keys():
                      m = year_pattern.match(v)
                      if m:
                          nums.append(int(m.group(1)))
          except Exception as e:
              print(f"PyPI check failed: {e}", file=sys.stderr)

          # Check crates.io (version format is YYYY.N.0)
          try:
              headers = {'User-Agent': 'dagex-publish-workflow/1.0'}
              r = requests.get('https://crates.io/api/v1/crates/dagex', timeout=10, headers=headers)
              if r.status_code == 200:
                  for v in r.json().get('versions', []):
                      m = year_pattern.match(v.get('num', ''))
                      if m:
                          nums.append(int(m.group(1)))
          except Exception as e:
              print(f"crates.io check failed: {e}", file=sys.stderr)

          next_num = max(nums) + 1 if nums else 1
          print(f"{year}.{next_num}")
          PYTHON_EOF
          )
          
          VERSION="$NEXT_VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
      
      - name: Update pyproject.toml
        run: |
          VERSION="${{ steps.set-version.outputs.version }}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          echo "Updated pyproject.toml:"
          grep "^version" pyproject.toml
      
      - name: Update Cargo.toml
        run: |
          VERSION="${{ steps.set-version.outputs.version }}"
          # Cargo requires SemVer with three parts (MAJOR.MINOR.PATCH)
          # If version has two parts (e.g., 2026.2), append .0 to make it 2026.2.0
          # If version already has three parts, use it as-is
          if [[ $VERSION =~ ^[0-9]+\.[0-9]+$ ]]; then
            CARGO_VERSION="${VERSION}.0"
          else
            CARGO_VERSION="$VERSION"
          fi
          sed -i "s/^version = .*/version = \"$CARGO_VERSION\"/" Cargo.toml
          echo "Updated Cargo.toml:"
          grep "^version" Cargo.toml
      
      - name: Commit version changes and create tag
        run: |
          VERSION="${{ steps.set-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml Cargo.toml Cargo.lock
          git commit -m "chore: bump version to $VERSION [skip ci]" || echo "No changes to commit"
          
          # Fetch tags from remote to check if tag exists
          git fetch --tags
          
          # Only create and push tag if it doesn't exist on remote
          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION$"; then
            echo "Tag v$VERSION already exists on remote, skipping tag creation"
          else
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION" || echo "Tag push failed (may already exist)"
          fi
          
          # Push any commits (if there were any)
          git push origin main || echo "Nothing to push"

  test:
    name: Run tests and examples
    needs: update-version
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Pull latest changes
        run: git pull origin main
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Run Rust tests
        run: |
          cargo test --verbose
        continue-on-error: true
      
      - name: Run Rust examples
        run: |
          bash scripts/run_examples.sh
        continue-on-error: true
      
      - name: Install maturin and build Python bindings
        run: |
          pip install maturin==1.2.0
          maturin build --release --features python --strip --out dist
      
      - name: Install Python package and run examples
        run: |
          pip install dist/*.whl
          bash scripts/run_python_examples.sh
        continue-on-error: true

  build-wheels:
    name: Build wheels on ${{ matrix.os }} for Python ${{ matrix.python-version }}
    needs: [update-version, test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Pull latest changes
        run: git pull origin main
        shell: bash
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install maturin
        run: pip install maturin==1.2.0
      
      - name: Build wheel
        run: |
          maturin build --release --features python --strip --out dist
      
      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  publish-pypi:
    name: Publish to PyPI
    needs: [update-version, build-wheels]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Pull latest changes
        run: git pull origin main
      
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      
      - name: List downloaded artifacts
        run: |
          echo "Publishing version: ${{ needs.update-version.outputs.version }}"
          echo "Contents of dist directory:"
          ls -lah dist/
          echo "Number of wheels: $(ls -1 dist/*.whl 2>/dev/null | wc -l)"
          echo "Wheel files:"
          ls -1 dist/*.whl 2>/dev/null || echo "No wheels found!"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install maturin and twine
        run: |
          pip install maturin==1.2.0 twine
      
      - name: Build source distribution
        run: |
          maturin build --release --features python --sdist --out dist
      
      - name: Publish to PyPI
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/* --username __token__ --password $PYPI_API_TOKEN --skip-existing --verbose

  publish-crates-io:
    name: Publish to crates.io
    needs: [update-version, test]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Pull latest changes
        run: git pull origin main
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/dagex/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "dagex@$VERSION already published on crates.io, skipping."
          else
            cargo publish --allow-dirty
          fi
